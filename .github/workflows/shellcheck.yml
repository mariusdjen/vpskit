name: ShellCheck

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Vérification syntaxe
        run: |
          bash -n setup.sh
          bash -n deploy.sh
          bash -n backup.sh
          bash -n status.sh
          bash -n settings.sh
          bash -n security.sh
          bash -n vpskit.sh
          bash -n lang.sh

      - name: ShellCheck
        uses: ludeeus/action-shellcheck@master
        with:
          scandir: '.'
          severity: warning
